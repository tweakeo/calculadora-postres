<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Postres — Chamberí Brothers</title>
  <style>
    :root {
      --bg-0:#0e0f13; --bg-1:#15171d; --bg-2:#1c1f27; --bg-3:#262a34;
      --border:#2c313c; --border-2:#3a4150;
      --text:#e7e9ee; --text-2:#9aa1b1; --text-3:#6b7280;
      --accent:#e9a0c4; --accent-2:#c9709c; --green:#56c08d; --yellow:#e3c05a; --red:#e07a6e;
      --radius:14px; --radius-sm:9px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg-0); color:var(--text); line-height:1.45;
      padding:24px 16px 64px; max-width:760px; margin:0 auto;
      -webkit-font-smoothing:antialiased;
    }
    h1 { font-size:21px; font-weight:700; letter-spacing:-.02em; }
    .sub { color:var(--text-2); font-size:13px; margin-top:3px; }
    .src-pill { display:inline-block; margin-top:8px; font-size:11px; color:var(--text-3);
      background:var(--bg-1); border:1px solid var(--border); padding:3px 9px; border-radius:999px; }

    /* selector */
    .selector { display:flex; flex-wrap:wrap; gap:8px; margin:20px 0 18px; }
    .chip {
      display:flex; align-items:center; gap:7px; padding:9px 14px; cursor:pointer;
      background:var(--bg-1); border:1px solid var(--border); border-radius:999px;
      font-size:14px; font-weight:600; color:var(--text-2); transition:.12s;
    }
    .chip:hover { border-color:var(--border-2); color:var(--text); }
    .chip.active { background:var(--accent); border-color:var(--accent); color:#1a0f16; }
    .chip .em { font-size:16px; }

    .card { background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:16px; }
    .card-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:4px; }
    .card-title { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:700; }
    .card-title .em { font-size:24px; }
    .cat { font-size:11px; color:var(--text-2); background:var(--bg-3); padding:3px 9px; border-radius:999px; }
    .notas { color:var(--text-2); font-size:13px; margin-top:8px; }
    .alg { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
    .alg span { font-size:11px; background:var(--bg-2); border:1px solid var(--border); padding:2px 8px; border-radius:999px; color:var(--text-2); }

    /* control tarros */
    .control { display:flex; align-items:center; gap:14px; margin:6px 0 2px; }
    .control-label { font-size:13px; color:var(--text-2); }
    .stepper { display:flex; align-items:center; gap:0; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
    .stepper button { width:42px; height:42px; border:none; background:transparent; color:var(--text); font-size:22px; cursor:pointer; transition:.1s; }
    .stepper button:hover { background:var(--bg-3); }
    .stepper input { width:64px; height:42px; border:none; background:transparent; color:var(--text); text-align:center; font-size:18px; font-weight:700; -moz-appearance:textfield; }
    .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{ -webkit-appearance:none; }
    .control-hint { font-size:12px; color:var(--text-3); }
    .quick { display:flex; gap:6px; }
    .quick button { padding:6px 11px; font-size:12px; background:var(--bg-2); border:1px solid var(--border); border-radius:999px; color:var(--text-2); cursor:pointer; }
    .quick button:hover { border-color:var(--border-2); color:var(--text); }

    /* stats */
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:16px; }
    .stat { background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; text-align:center; }
    .stat-val { font-size:19px; font-weight:700; letter-spacing:-.02em; }
    .stat-label { font-size:11px; color:var(--text-2); margin-top:3px; }
    .stat.semaforo .stat-val { font-size:15px; }

    /* ingredient table */
    .col-title { font-size:13px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.04em; margin:4px 0 10px; }
    .ing { display:grid; grid-template-columns:1fr 92px 76px; align-items:baseline; gap:12px; padding:7px 0; border-bottom:1px solid var(--border); }
    .ing:last-child { border-bottom:none; }
    .ing-name { font-size:14px; min-width:0; }
    .ing-name .ex { color:var(--yellow); font-size:11px; margin-left:5px; }
    .ing-qty { font-size:14px; font-weight:600; white-space:nowrap; text-align:right; font-variant-numeric:tabular-nums; }
    .ing-cost { font-size:12px; color:var(--text-3); text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
    .ing-foot { display:grid; grid-template-columns:1fr 76px; gap:12px; padding-top:11px; margin-top:4px; font-weight:700; font-size:14px; }
    .ing-foot span:last-child { text-align:right; font-variant-numeric:tabular-nums; }

    /* sensorial */
    .sens { display:flex; flex-direction:column; gap:9px; }
    .sens-row { display:flex; align-items:center; gap:10px; }
    .sens-label { font-size:13px; color:var(--text-2); width:130px; }
    .sens-bar { flex:1; height:8px; background:var(--bg-3); border-radius:999px; overflow:hidden; }
    .sens-fill { height:100%; background:linear-gradient(90deg,var(--accent-2),var(--accent)); border-radius:999px; }

    /* metodo */
    ol.metodo { padding-left:20px; display:flex; flex-direction:column; gap:7px; }
    ol.metodo li { font-size:13.5px; color:var(--text); padding-left:4px; }
    ol.metodo li::marker { color:var(--accent); font-weight:700; }

    /* lote strip */
    .lote-strip { display:flex; flex-wrap:wrap; align-items:center; gap:10px; }
    .lote-label { font-size:13px; font-weight:700; color:var(--text-2); }
    .lote-inp { height:38px; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); padding:0 11px; font-size:13px; }
    #lote-fecha { width:150px; } #lote-autor { width:150px; }
    .lote-inp:focus { outline:none; border-color:var(--accent); }
    .btn { height:38px; padding:0 16px; border:1px solid var(--border-2); background:var(--bg-3); color:var(--text); border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; transition:.12s; }
    .btn:hover { background:var(--border-2); }
    .btn-accent { background:var(--accent); border-color:var(--accent); color:#1a0f16; }
    .btn-accent:hover { background:var(--accent-2); }
    .lote-result { display:none; align-items:center; gap:9px; margin-top:12px; padding:11px 14px; background:var(--bg-2); border:1px dashed var(--accent-2); border-radius:var(--radius-sm); }
    .lote-result.visible { display:flex; }
    .lote-num { font-size:16px; font-weight:700; letter-spacing:.02em; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--accent); }

    .resumen-box { margin-top:12px; }
    pre.resumen { background:var(--bg-0); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; font-size:12px; color:var(--text-2); white-space:pre-wrap; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; max-height:230px; overflow:auto; }

    .warn { font-size:12px; color:var(--yellow); background:rgba(227,192,90,.08); border:1px solid rgba(227,192,90,.25); border-radius:var(--radius-sm); padding:9px 12px; margin-top:12px; }

    /* toast */
    #toast { position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); opacity:0; pointer-events:none;
      background:var(--accent); color:#1a0f16; font-weight:600; font-size:13px; padding:10px 18px; border-radius:999px; transition:.25s; z-index:50; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    @media (max-width:560px){ .stats{ grid-template-columns:repeat(2,1fr); } #lote-fecha,#lote-autor{ width:100%; } }
  </style>
</head>
<body>
  <header>
    <h1>🧮 Calculadora de Postres</h1>
    <div class="sub">Chamberí Brothers — producción de tartas en tarro · unidad base = 1 tarro (370 ml)</div>
    <span class="src-pill" id="src-pill">Datos: Notion</span>
  </header>

  <div class="selector" id="selector"></div>

  <div class="card" id="card-receta"></div>

  <div class="card">
    <div class="col-title">🧾 Ingredientes para la producción</div>
    <div id="ingredientes"></div>
  </div>

  <div class="card">
    <div class="col-title">🌶 Perfil sensorial</div>
    <div class="sens" id="sensorial"></div>
  </div>

  <div class="card">
    <div class="col-title">📋 Método</div>
    <ol class="metodo" id="metodo"></ol>
  </div>

  <div class="card">
    <div class="col-title">🏷️ Lote de producción</div>
    <div class="lote-strip">
      <span class="lote-label">Nº Lote</span>
      <input type="date" id="lote-fecha" class="lote-inp" />
      <input type="text" id="lote-autor" class="lote-inp" placeholder="Encargado" list="autores" autocomplete="off" />
      <datalist id="autores"></datalist>
      <button class="btn btn-accent" onclick="generarLote()">🚀 Generar lote</button>
    </div>
    <div class="lote-result" id="lote-result">
      <span class="lote-num" id="lote-num"></span>
      <button class="btn" onclick="copiarLote()" title="Copiar nº de lote">📋 Copiar</button>
    </div>
    <div class="resumen-box">
      <pre class="resumen" id="resumen"></pre>
      <button class="btn" style="margin-top:10px" onclick="copiarResumen()">📋 Copiar resumen para PRODUCCIONES</button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="data.js"></script>
  <script>
  // ─── STATE ──────────────────────────────────────────────────────────────
  const DATA = window.POSTRES_DATA || { _meta:{}, tartas:[] };
  const META = DATA._meta || {};
  const PACK = META.packagingPorTarro ?? 0.82;
  const PREFIX = META.lotePrefix || "TT";
  let currentId = (DATA.tartas[0] || {}).id;
  let tarros = 1;

  // ─── HELPERS ────────────────────────────────────────────────────────────
  const fmt = (n,d=2)=> (Number(n)||0).toFixed(d).replace(".",",");
  const eur = n => fmt(n)+" €";
  const wt  = n => n>=1000 ? fmt(n/1000,2)+" kg" : (Math.round(n*10)/10)+" g";
  const vol = n => n>=1000 ? fmt(n/1000,2)+" L"  : (Math.round(n*10)/10)+" ml";
  const med = (n,u)=> u==="ml" ? vol(n) : wt(n);
  const cur = () => DATA.tartas.find(t=>t.id===currentId) || DATA.tartas[0];

  function isoDate(d){ return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`; }
  function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }

  // ─── CÁLCULO (espejo de las fórmulas de Notion) ───────────────────────────
  function calc(t, n){
    const costeIngPorTarro = t.ingredientes.reduce((s,i)=> s + i.cantidad*(i.costePorUnidad||0), 0);
    const costeIngLote = costeIngPorTarro * n;
    const packaging = PACK * n;
    const costeLote = costeIngLote + packaging;
    const costePorTarro = costeLote / n;                 // = costeIngPorTarro + PACK
    const pvp = t.pvpDelivery || 0;
    const margen = pvp ? pvp - costePorTarro : 0;
    const fc = pvp ? (costePorTarro/pvp)*100 : 0;
    const sem = !pvp ? "—" : fc<=28 ? "🟢 Óptimo" : fc<=33 ? "🟡 Atención" : "🔴 Alto";
    return { costeIngPorTarro, costeLote, costePorTarro, margen, fc, sem, pvp };
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  function renderSelector(){
    document.getElementById("selector").innerHTML = DATA.tartas.map(t=>
      `<div class="chip ${t.id===currentId?"active":""}" onclick="selectTarta('${t.id}')">
         <span class="em">${t.emoji||"🍰"}</span>${t.nombre}</div>`).join("");
  }
  function selectTarta(id){ currentId=id; tarros = cur().tarrosBatch || 1; render(); }
  function setTarros(v){ tarros = Math.max(1, Math.min(999, Math.round(v)||1)); render(); }
  function adj(d){ setTarros(tarros+d); }

  function render(){
    const t = cur(); if(!t) return;
    const c = calc(t, tarros);
    renderSelector();
    document.getElementById("src-pill").textContent = "Datos: " + (META.fuente || "Notion");

    // receta card
    document.getElementById("card-receta").innerHTML = `
      <div class="card-head">
        <div class="card-title"><span class="em">${t.emoji||"🍰"}</span>${t.nombre}</div>
      </div>
      <div class="notas">${t.notas||""}</div>
      <div class="alg">${(t.alergenos||[]).map(a=>`<span>${a}</span>`).join("")}</div>
      <div class="control">
        <span class="control-label">Tarros a producir</span>
        <div class="stepper">
          <button onclick="adj(-1)">−</button>
          <input type="number" id="tarros-inp" value="${tarros}" min="1" onchange="setTarros(this.value)" />
          <button onclick="adj(1)">+</button>
        </div>
        <div class="quick">
          <button onclick="setTarros(${t.tarrosBatch||10})">Batch (${t.tarrosBatch||10})</button>
          <button onclick="setTarros(20)">20</button>
          <button onclick="setTarros(50)">50</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-val">${eur(c.costeLote)}</div><div class="stat-label">Coste lote</div></div>
        <div class="stat"><div class="stat-val">${eur(c.costePorTarro)}</div><div class="stat-label">Coste / tarro</div></div>
        <div class="stat"><div class="stat-val">${t.pvpDelivery?eur(c.margen):"—"}</div><div class="stat-label">Margen / tarro</div></div>
        <div class="stat semaforo"><div class="stat-val">${c.sem}</div><div class="stat-label">Food Cost ${t.pvpDelivery?fmt(c.fc,1)+"%":""}</div></div>
      </div>`;

    // ingredientes escalados
    const rows = t.ingredientes.map(i=>{
      const q = i.cantidad*tarros, cost = i.cantidad*(i.costePorUnidad||0)*tarros;
      return `<div class="ing">
        <span class="ing-name">${i.nombre}${i.ejemplo?'<span class="ex">coste ej.</span>':""}</span>
        <span class="ing-qty">${med(q,i.unidad)}</span>
        <span class="ing-cost">${eur(cost)}</span></div>`;
    }).join("");
    const hayEjemplo = t.ingredientes.some(i=>i.ejemplo);
    document.getElementById("ingredientes").innerHTML = rows +
      `<div class="ing-foot"><span>Coste ingredientes (${tarros} tarros)</span><span>${eur(c.costeIngPorTarro*tarros)}</span></div>
       <div class="ing-foot" style="font-weight:600;color:var(--text-2)"><span>+ Packaging (${tarros} × ${fmt(PACK)} €)</span><span>${eur(PACK*tarros)}</span></div>` +
      (hayEjemplo ? `<div class="warn">⚠️ Algunos costes son de <b>ejemplo</b> (faltan en Notion: CANT. PACK). Rellénalos en INVENTARIO y vuelve a sincronizar para costes reales.</div>` : "");

    // sensorial
    const maxS = 8;
    document.getElementById("sensorial").innerHTML = Object.entries(t.sensorial||{}).map(([k,v])=>
      `<div class="sens-row"><span class="sens-label">${k}</span>
        <div class="sens-bar"><div class="sens-fill" style="width:${Math.min(100,(v/maxS)*100)}%"></div></div></div>`).join("");

    // metodo
    document.getElementById("metodo").innerHTML = (t.metodo||[]).map(s=>`<li>${s}</li>`).join("");

    renderResumen();
  }

  // ─── LOTES ────────────────────────────────────────────────────────────────
  function batchKey(){ return "tt_batch"; }
  function getCounter(){
    const today=isoDate(new Date());
    if(localStorage.getItem("tt_batch_date")!==today){ localStorage.setItem("tt_batch_date",today); localStorage.setItem("tt_batch_count","0"); return 0; }
    return parseInt(localStorage.getItem("tt_batch_count")||"0",10);
  }
  function incCounter(){ const today=isoDate(new Date()); const n=getCounter()+1; localStorage.setItem("tt_batch_date",today); localStorage.setItem("tt_batch_count",String(n)); return n; }
  function loteActual(){ return document.getElementById("lote-num").textContent || "(sin generar)"; }

  function generarLote(){
    const fv = document.getElementById("lote-fecha").value;
    const fecha = fv ? fv.replaceAll("-","") : isoDate(new Date());
    const n = incCounter();
    const lote = `${PREFIX}-${fecha}-${String(n).padStart(3,"0")}`;
    document.getElementById("lote-num").textContent = lote;
    document.getElementById("lote-result").classList.add("visible");
    const a = document.getElementById("lote-autor").value.trim();
    if(a){ const prev=JSON.parse(localStorage.getItem("tt_autores")||"[]"); if(!prev.includes(a)){ prev.push(a); localStorage.setItem("tt_autores",JSON.stringify(prev)); renderAutores(); } }
    toast(`Lote ${lote} generado`);
    renderResumen();
  }
  function copiarLote(){ const l=document.getElementById("lote-num").textContent; if(l) copy(l,"Lote copiado"); }

  function renderResumen(){
    const t=cur(); if(!t) return; const c=calc(t,tarros);
    const fv=document.getElementById("lote-fecha").value;
    const fecha = fv || new Date().toISOString().slice(0,10);
    const autor = document.getElementById("lote-autor").value.trim() || "—";
    const txt =
`LOTE: ${loteActual()}
Postre: ${t.emoji} ${t.nombre}
Fecha: ${fecha}   Encargado: ${autor}
Tarros producidos: ${tarros}
Coste lote: ${eur(c.costeLote)}   Coste/tarro: ${eur(c.costePorTarro)}
PVP delivery: ${t.pvpDelivery?eur(t.pvpDelivery):"—"}   Margen/tarro: ${t.pvpDelivery?eur(c.margen):"—"}
Food Cost: ${t.pvpDelivery?fmt(c.fc,1)+"% "+c.sem:"—"}
— Ingredientes —
${t.ingredientes.map(i=>`· ${i.nombre}: ${med(i.cantidad*tarros,i.unidad)}`).join("\n")}`;
    document.getElementById("resumen").textContent = txt;
  }
  function copiarResumen(){ copy(document.getElementById("resumen").textContent,"Resumen copiado"); }

  function copy(txt,msg){
    if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast(msg)).catch(()=>fallbackCopy(txt,msg)); }
    else fallbackCopy(txt,msg);
  }
  function fallbackCopy(txt,msg){ const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy"); toast(msg);}catch(e){} ta.remove(); }

  function renderAutores(){ const a=JSON.parse(localStorage.getItem("tt_autores")||"[]"); document.getElementById("autores").innerHTML=a.map(x=>`<option value="${x}">`).join(""); }

  // ─── INIT ───────────────────────────────────────────────────────────────
  document.getElementById("lote-fecha").value = new Date().toISOString().slice(0,10);
  document.getElementById("lote-autor").addEventListener("input", renderResumen);
  document.getElementById("lote-fecha").addEventListener("change", renderResumen);
  renderAutores();
  if(!DATA.tartas.length){ document.body.insertAdjacentHTML("beforeend","<p style='color:var(--red)'>No hay datos. Ejecuta <code>node sync-notion.mjs</code>.</p>"); }
  else render();
  </script>
</body>
</html>
